<input id="scanInput" type="text" placeholder="Scanne ou tape le code de la boîte">
<button id="searchBtn">Rechercher</button>

<script>
async function loadStock() {
  const res = await fetch('./stock.json');
  return await res.json();
}

function normalizeScan(raw) {
  if (!raw) return '';

  let value = raw.trim();

  // majuscules
  value = value.toUpperCase();

  // remplace caractères parasites fréquents
  value = value.replace(/°/g, '-');
  value = value.replace(/_/g, '-');
  value = value.replace(/\s+/g, '');

  // enlève préfixe/suffixe parasites type Q...Q
  value = value.replace(/^Q+/, '');
  value = value.replace(/Q+$/, '');

  // corrige BX sans tiret : BX042 -> BX-042
  value = value.replace(/^BX[- ]?(\d+)$/, (_, num) => {
    return `BX-${num.padStart(3, '0')}`;
  });

  // corrige si minuscule ou autre format proche
  value = value.replace(/^B[Xx][- ]?(\d+)$/, (_, num) => {
    return `BX-${num.padStart(3, '0')}`;
  });

  return value;
}

async function searchBox() {
  const stock = await loadStock();
  const input = document.getElementById('scanInput').value;
  const normalized = normalizeScan(input);

  const found = stock.find(box => box.id.toUpperCase() === normalized);

  if (found) {
    window.location.href = `box.html?id=${encodeURIComponent(found.id)}`;
  } else {
    alert(`Boîte introuvable : ${normalized}`);
  }
}

document.getElementById('searchBtn').addEventListener('click', searchBox);

document.getElementById('scanInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    searchBox();
  }
});
</script>
