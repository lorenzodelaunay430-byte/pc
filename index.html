<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi Boîtes Maintenance</title>
<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f0f2f5;
  color: #333;
  margin: 0;
  padding: 0;
}
header {
  text-align: center;
  padding: 20px;
  background: #3498db;
  color: white;
  font-size: 1.8em;
}
.container {
  max-width: 900px;
  margin: 20px auto;
  padding: 0 15px;
}
input[type="text"] {
  width: 100%;
  padding: 12px;
  font-size: 1em;
  border-radius: 6px;
  border: 1px solid #ccc;
  box-sizing: border-box;
  margin-bottom: 20px;
}
.boxes-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(180px,1fr));
  gap: 15px;
}
.box {
  background: white;
  border-radius: 10px;
  padding: 15px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  transition: transform 0.2s;
  cursor: pointer;
}
.box:hover {
  transform: translateY(-5px);
}
.box h3 {
  margin: 0 0 10px 0;
  font-size: 1.2em;
  color: #2c3e50;
}
.box p {
  margin: 4px 0;
  font-size: 0.95em;
  color: #555;
}
.box input, .box select {
  width: 100%;
  margin-top: 4px;
  margin-bottom: 8px;
  padding: 6px;
  font-size: 0.9em;
  border-radius: 4px;
  border: 1px solid #ccc;
}
.box button {
  background-color: #3498db;
  color: white;
  border: none;
  padding: 8px;
  border-radius: 6px;
  cursor: pointer;
  width: 100%;
  font-weight: bold;
}
.box button:hover {
  background-color: #2980b9;
}
#message {
  text-align: center;
  margin-bottom: 20px;
  font-weight: bold;
  color: green;
}
</style>
</head>
<body>

<header>Suivi des Boîtes Maintenance</header>
<div class="container">
  <input id="searchInput" placeholder="Scannez ou tapez le code d'une boîte" autofocus>
  <div id="message"></div>
  <div class="boxes-grid" id="boxesGrid"></div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabaseUrl = 'https://aecifmxziwddaqihjjey.supabase.co'
const supabaseKey = 'sb_publishable_Kq-2FsEdgffq0bMt-zfXZg_TbiOJcdP'
const supabase = createClient(supabaseUrl, supabaseKey)

const boxesGrid = document.getElementById('boxesGrid')
const searchInput = document.getElementById('searchInput')
const messageDiv = document.getElementById('message')

// Extraire le code de la boîte même si scan avec caractères parasites
function extractBoxCode(scan) {
  const clean = scan.toUpperCase().replace(/\s/g,'')
  const match = clean.match(/BX-?0?([1-9]|[1-3][0-9]|4[0-7])/)
  if(match) {
    return 'BX-' + match[1].padStart(3,'0')
  }
  return null
}

// Afficher les boîtes (filtrées si code fourni)
async function displayBoxes(filterCode='') {
  let query = supabase.from('boite').select('*')
  if(filterCode) query = query.eq('code_boite', filterCode)
  const { data, error } = await query
  boxesGrid.innerHTML = ''
  if(error || !data.length) {
    boxesGrid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:red">Boîte non trouvée</p>'
    return
  }
  data.forEach(box => {
    const boxDiv = document.createElement('div')
    boxDiv.className = 'box'
    boxDiv.innerHTML = `
      <h3>${box.code_boite}</h3>
      <p>Localisation:</p>
      <select class="locSelect">
        <option value="">--</option>
        <option value="Stock">Stock</option>
        <option value="Atelier H">Atelier H</option>
      </select>
      <p>Statut:</p>
      <select class="statutSelect">
        <option value="">--</option>
        <option value="En stock">En stock</option>
        <option value="Non disponible">Non disponible</option>
      </select>
      <p>Défaut:</p>
      <input class="defautInput" type="text" placeholder="Défaut">
      <button>Sauvegarder</button>
    `
    boxDiv.querySelector('.locSelect').value = box.localisation || ''
    boxDiv.querySelector('.statutSelect').value = box.statut || ''
    boxDiv.querySelector('.defautInput').value = box.defaut || ''

    boxDiv.querySelector('button').onclick = async () => {
      const localisation = boxDiv.querySelector('.locSelect').value
      const statut = boxDiv.querySelector('.statutSelect').value
      const defaut = boxDiv.querySelector('.defautInput').value
      const { error } = await supabase.from('boite').update({ localisation, statut, defaut }).eq('code_boite', box.code_boite)
      if(error) {
        messageDiv.style.color = 'red'
        messageDiv.textContent = 'Erreur lors de la sauvegarde'
      } else {
        messageDiv.style.color = 'green'
        messageDiv.textContent = 'Sauvegardé avec succès'
      }
      setTimeout(()=>{messageDiv.textContent=''},2000)
    }

    boxesGrid.appendChild(boxDiv)
  })
}

// Détecter scan ou Enter
searchInput.addEventListener('keypress', (e) => {
  if(e.key === 'Enter') {
    const code = extractBoxCode(searchInput.value)
    searchInput.value = ''
    if(code) displayBoxes(code)
    else boxesGrid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:red">Boîte non trouvée</p>'
  }
})

// Filtrage en tapant
searchInput.addEventListener('input', () => {
  const code = extractBoxCode(searchInput.value)
  if(code) displayBoxes(code)
})

// Afficher toutes les boîtes au départ
displayBoxes()
</script>

</body>
</html>
